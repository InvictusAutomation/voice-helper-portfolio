<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- 蓝天白云背景 -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B0E0E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <filter id="sketchy">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>
  </defs>
  
  <!-- 天空 -->
  <rect width="800" height="600" fill="url(#skyGradient)"/>
  
  <!-- 云朵 - 手绘风格 -->
  <g stroke="#FFFFFF" stroke-width="3" fill="#FFFFFF" fill-opacity="0.8" filter="url(#sketchy)">
    <path d="M100,100 Q120,70 150,80 Q170,50 200,70 Q230,60 250,90 Q280,85 290,110 Q300,140 270,150 Q250,170 210,160 Q170,175 130,160 Q90,150 100,100Z"/>
    <path d="M500,80 Q530,50 560,70 Q590,55 620,80 Q650,70 670,100 Q690,130 660,145 Q630,160 590,150 Q550,165 510,150 Q470,135 500,80Z"/>
    <path d="M650,200 Q670,180 690,195 Q710,185 725,205 Q740,200 750,220 Q760,245 740,255 Q720,270 690,260 Q660,270 635,255 Q610,240 650,200Z"/>
  </g>
  
  <!-- 草地 -->
  <path d="M0,450 Q200,430 400,450 Q600,470 800,450 L800,600 L0,600Z" fill="#90EE90" stroke="#228B22" stroke-width="2"/>
  
  <!-- 男孩1 - 三角形头（菲尼斯风格） -->
  <g transform="translate(250, 320)" filter="url(#sketchy)">
    <!-- 身体 -->
    <path d="M30,80 L20,180 L80,180 L70,80Z" fill="#FF6B6B" stroke="#CC5555" stroke-width="2"/>
    <!-- 头 - 三角形 -->
    <path d="M20,80 L50,20 L80,80Z" fill="#FDBF60" stroke="#E5A855" stroke-width="2"/>
    <!-- 眼睛 -->
    <ellipse cx="45" cy="55" rx="8" ry="10" fill="white" stroke="#333" stroke-width="1"/>
    <ellipse cx="65" cy="55" rx="8" ry="10" fill="white" stroke="#333" stroke-width="1"/>
    <circle cx="47" cy="58" r="3" fill="#333"/>
    <circle cx="67" cy="58" r="3" fill="#333"/>
    <!-- 嘴巴 - 自信的微笑 -->
    <path d="M40,75 Q50,85 60,75" stroke="#333" stroke-width="2" fill="none"/>
    <!-- 头发 -->
    <path d="M20,80 L15,70 L25,75 L30,60 L40,75 L50,15 L60,75 L70,60 L75,75 L80,80" fill="#4A3728" stroke="#333" stroke-width="1"/>
    <!-- 手臂 - 指向远方 -->
    <path d="M25,100 L-10,85" stroke="#FDBF60" stroke-width="8" stroke-linecap="round"/>
    <path d="M70,100 L100,85" stroke="#FDBF60" stroke-width="8" stroke-linecap="round"/>
    <!-- 腿 -->
    <path d="M30,180 L25,220" stroke="#1E3A5F" stroke-width="10" stroke-linecap="round"/>
    <path d="M70,180 L75,220" stroke="#1E3A5F" stroke-width="10" stroke-linecap="round"/>
    <!-- 鞋子 -->
    <ellipse cx="20" cy="225" rx="12" ry="6" fill="#654321"/>
    <ellipse cx="80" cy="225" rx="12" ry="6" fill="#654321"/>
  </g>
  
  <!-- 男孩2 - 高瘦（费布风格） -->
  <g transform="translate(420, 280)" filter="url(#sketchy)">
    <!-- 身体 -->
    <path d="M25,60 L15,200 L65,200 L55,60Z" fill="#4ECDC4" stroke="#3BA99C" stroke-width="2"/>
    <!-- 头 - 长脸 -->
    <ellipse cx="40" cy="40" rx="25" ry="30" fill="#FDBF60" stroke="#E5A855" stroke-width="2"/>
    <!-- 头发 - 竖起来 -->
    <path d="M15,30 Q10,10 25,5 Q30,-5 40,8 Q50,-5 55,5 Q70,10 65,30" fill="#2C3E50" stroke="#1A252F" stroke-width="1"/>
    <!-- 眼睛 - 半闭着，很酷 -->
    <line x1="30" y1="38" x2="40" y2="38" stroke="#333" stroke-width="2"/>
    <line x1="45" y1="38" x2="55" y2="38" stroke="#333" stroke-width="2"/>
    <!-- 嘴巴 - 平静的直线 -->
    <line x1="35" y1="55" x2="45" y2="55" stroke="#333" stroke-width="2"/>
    <!-- 手臂 -->
    <path d="M20,80 L0,120" stroke="#FDBF60" stroke-width="7" stroke-linecap="round"/>
    <path d="M60,80 L80,120" stroke="#FDBF60" stroke-width="7" stroke-linecap="round"/>
    <!-- 腿 - 更长 -->
    <path d="M25,200 L20,250" stroke="#8B4513" stroke-width="9" stroke-linecap="round"/>
    <path d="M55,200 L60,250" stroke="#8B4513" stroke-width="9" stroke-linecap="round"/>
    <!-- 鞋子 -->
    <ellipse cx="15" cy="255" rx="10" ry="5" fill="#333"/>
    <ellipse cx="65" cy="255" rx="10" ry="5" fill="#333"/>
  </g>
  
  <!-- 道具 - 代表创造力的元素 -->
  <g transform="translate(550, 400)" filter="url(#sketchy)">
    <!-- 一个疯狂的发明/装置 -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FF6B6B" stroke-width="3"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#4ECDC4" stroke-width="2"/>
    <line x1="0" y1="-30" x2="0" y2="-50" stroke="#666" stroke-width="3"/>
    <circle cx="0" cy="-55" r="8" fill="#FFD93D" stroke="#F5C800" stroke-width="2"/>
    <!-- 齿轮 -->
    <circle cx="40" cy="20" r="15" fill="none" stroke="#666" stroke-width="2"/>
    <line x1="40" y1="5" x2="40" y2="35" stroke="#666" stroke-width="2"/>
    <line x1="25" y1="20" x2="55" y2="20" stroke="#666" stroke-width="2"/>
    <!-- 管道 -->
    <path d="M-20,10 Q-40,30 -30,50" fill="none" stroke="#4A90E2" stroke-width="4"/>
  </g>
  
  <!-- 太阳 -->
  <circle cx="700" cy="80" r="40" fill="#FFD93D" stroke="#F5C800" stroke-width="2" filter="url(#sketchy)"/>
  <g stroke="#FFD93D" stroke-width="3" stroke-linecap="round">
    <line x1="700" y1="25" x2="700" y2="10"/>
    <line x1="700" y1="135" x2="700" y2="150"/>
    <line x1="645" y1="80" x2="630" y2="80"/>
    <line x1="755" y1="80" x2="770" y2="80"/>
    <line x1="661" y1="41" x2="650" y2="30"/>
    <line x1="739" y1="119" x2="750" y2="130"/>
    <line x1="661" y1="119" x2="650" y2="130"/>
    <line x1="739" y1="41" x2="750" y2="30"/>
  </g>
  
  <!-- 装饰线条 - 手绘感 -->
  <g stroke="#87CEEB" stroke-width="1.5" stroke-opacity="0.5">
    <path d="M50,500 Q100,480 150,510 Q200,490 250,520" fill="none"/>
    <path d="M550,520 Q600,500 650,530 Q700,510 750,540" fill="none"/>
  </g>
</svg>