<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="summerSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#81D4FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1F5FE;stop-opacity:1" />
    </linearGradient>
    <filter id="handDrawn" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
    </filter>
  </defs>
  
  <!-- 天空背景 -->
  <rect width="1920" height="1080" fill="url(#summerSky)"/>
  
  <!-- 云朵 -->
  <g fill="#FFFFFF" fill-opacity="0.9" filter="url(#handDrawn)">
    <path d="M200,200 Q250,120 350,150 Q450,100 550,160 Q650,140 700,220 Q750,300 650,320 Q550,360 400,340 Q250,360 150,300 Q100,250 200,200Z"/>
    <path d="M1200,150 Q1280,80 1380,120 Q1480,80 1580,140 Q1680,120 1750,200 Q1820,280 1720,300 Q1620,340 1480,320 Q1340,350 1220,300 Q1140,250 1200,150Z"/>
    <path d="M800,100 Q860,50 920,80 Q980,50 1040,90 Q1100,80 1140,130 Q1180,180 1120,200 Q1060,230 980,210 Q900,240 820,200 Q760,170 800,100Z" fill-opacity="0.6"/>
  </g>
  
  <!-- 草地/地面 -->
  <path d="M0,700 Q480,650 960,700 Q1440,750 1920,700 L1920,1080 L0,1080Z" fill="#66BB6A" stroke="#4CAF50" stroke-width="3" filter="url(#handDrawn)"/>
  
  <!-- 男孩剪影1 - 红色衣服，三角形头 -->
  <g transform="translate(600, 480)" filter="url(#handDrawn)">
    <!-- 身体 -->
    <path d="M50,100 L30,280 L130,280 L110,100Z" fill="#FF5252" stroke="#D32F2F" stroke-width="3"/>
    <!-- 头 -->
    <path d="M40,100 L80,20 L120,100Z" fill="#FFCC80" stroke="#FFB74D" stroke-width="3"/>
    <!-- 头发 -->
    <path d="M40,100 L30,80 L50,90 L60,60 L70,85 L80,15 L90,85 L100,60 L110,90 L120,100" fill="#5D4037" stroke="#3E2723" stroke-width="2"/>
    <!-- 短裤 -->
    <path d="M30,280 L25,320 L70,320 L80,280 L90,320 L135,320 L130,280Z" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
    <!-- 手臂举起 -->
    <path d="M40,130 L-10,80" stroke="#FFCC80" stroke-width="12" stroke-linecap="round"/>
    <path d="M110,130 L160,180" stroke="#FFCC80" stroke-width="12" stroke-linecap="round"/>
    <!-- 腿 -->
    <line x1="50" y1="320" x2="45" y2="380" stroke="#FFCC80" stroke-width="10" stroke-linecap="round"/>
    <line x1="110" y1="320" x2="115" y2="380" stroke="#FFCC80" stroke-width="10" stroke-linecap="round"/>
    <!-- 鞋子 -->
    <ellipse cx="40" cy="385" rx="20" ry="8" fill="#424242"/>
    <ellipse cx="120" cy="385" rx="20" ry="8" fill="#424242"/>
  </g>
  
  <!-- 男孩剪影2 - 绿色衣服，高个子 -->
  <g transform="translate(900, 420)" filter="url(#handDrawn)">
    <!-- 身体 -->
    <path d="M40,80 L20,340 L100,340 L80,80Z" fill="#26A69A" stroke="#00897B" stroke-width="3"/>
    <!-- 头 -->
    <ellipse cx="60" cy="50" rx="35" ry="40" fill="#FFCC80" stroke="#FFB74D" stroke-width="3"/>
    <!-- 头发 - 竖起来 -->
    <path d="M25,40 Q20,10 35,5 Q40,-10 50,10 Q60,-10 70,5 Q85,10 80,40" fill="#37474F" stroke="#263238" stroke-width="2"/>
    <!-- 眼睛 - 半睁 -->
    <line x1="45" y1="45" x2="60" y2="45" stroke="#333" stroke-width="3"/>
    <line x1="65" y1="45" x2="80" y2="45" stroke="#333" stroke-width="3"/>
    <!-- 嘴巴 - 平静 -->
    <line x1="50" y1="70" x2="70" y2="70" stroke="#333" stroke-width="2"/>
    <!-- 手臂 -->
    <path d="M30,110 L-10,150" stroke="#FFCC80" stroke-width="10" stroke-linecap="round"/>
    <path d="M90,110 L130,70" stroke="#FFCC80" stroke-width="10" stroke-linecap="round"/>
    <!-- 裤子 -->
    <path d="M20,340 L15,400 L55,400 L60,340 L65,400 L105,400 L100,340Z" fill="#FF8F00" stroke="#F57C00" stroke-width="2"/>
    <!-- 腿 -->
    <line x1="35" y1="400" x2="30" y2="480" stroke="#FFCC80" stroke-width="9" stroke-linecap="round"/>
    <line x1="85" y1="400" x2="90" y2="480" stroke="#FFCC80" stroke-width="9" stroke-linecap="round"/>
    <!-- 鞋子 -->
    <ellipse cx="25" cy="485" rx="18" ry="7" fill="#424242"/>
    <ellipse cx="95" cy="485" rx="18" ry="7" fill="#424242"/>
  </g>
  
  <!-- 疯狂发明 - 在背景中 -->
  <g transform="translate(1300, 500)" filter="url(#handDrawn)">
    <!-- 主体结构 -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#FF5252" stroke-width="4"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#26A69A" stroke-width="3"/>
    <!-- 管道 -->
    <path d="M-80,0 Q-150,-50 -120,-120" fill="none" stroke="#FFA726" stroke-width="8"/>
    <path d="M80,0 Q150,50 180,80" fill="none" stroke="#42A5F5" stroke-width="6"/>
    <!-- 顶端装置 -->
    <circle cx="-120" cy="-130" r="25" fill="#FFD54F" stroke="#FFB300" stroke-width="3"/>
    <!-- 齿轮 -->
    <circle cx="120" cy="60" r="30" fill="none" stroke="#78909C" stroke-width="3"/>
    <line x1="120" y1="30" x2="120" y2="90" stroke="#78909C" stroke-width="3"/>
    <line x1="90" y1="60" x2="150" y2="60" stroke="#78909C" stroke-width="3"/>
    <line x1="99" y1="39" x2="141" y2="81" stroke="#78909C" stroke-width="3"/>
    <line x1="141" y1="39" x2="99" y2="81" stroke="#78909C" stroke-width="3"/>
    <!-- 连接管道 -->
    <path d="M-50,50 Q-80,100 -50,150" fill="none" stroke="#66BB6A" stroke-width="6"/>
    <circle cx="-50" cy="160" r="15" fill="#EF5350"/>
  </g>
  
  <!-- 太阳 - 卡通风格 -->
  <g transform="translate(1700, 150)" filter="url(#handDrawn)">
    <circle cx="0" cy="0" r="60" fill="#FFD54F" stroke="#FFB300" stroke-width="3"/>
    <!-- 太阳光线 -->
    <g stroke="#FFD54F" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-75" x2="0" y2="-95"/>
      <line x1="0" y1="75" x2="0" y2="95"/>
      <line x1="-75" y1="0" x2="-95" y2="0"/>
      <line x1="75" y1="0" x2="95" y2="0"/>
      <line x1="-53" y1="-53" x2="-67" y2="-67"/>
      <line x1="53" y1="53" x2="67" y2="67"/>
      <line x1="-53" y1="53" x2="-67" y2="67"/>
      <line x1="53" y1="-53" x2="67" y2="-67"/>
    </g>
    <!-- 墨镜 -->
    <rect x="-30" y="-10" width="25" height="15" rx="3" fill="#333"/>
    <rect x="5" y="-10" width="25" height="15" rx="3" fill="#333"/>
    <line x1="-5" y1="-5" x2="5" y2="-5" stroke="#333" stroke-width="2"/>
    <!-- 微笑 -->
    <path d="M-15,20 Q0,30 15,20" stroke="#333" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 飞鸟 -->
  <g stroke="#333" stroke-width="2" fill="none" filter="url(#handDrawn)">
    <path d="M300,250 Q310,240 320,250 Q310,255 300,250">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="50,-20" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M350,200 Q360,190 370,200 Q360,205 350,200">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="40,-15" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M400,280 Q410,270 420,280 Q410,285 400,280">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="60,-25" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 装饰草 -->
  <g stroke="#388E3C" stroke-width="2" fill="none" filter="url(#handDrawn)">
    <path d="M100,750 Q110,720 105,700"/>
    <path d="M120,760 Q125,730 130,710"/>
    <path d="M1500,800 Q1490,770 1505,750"/>
    <path d="M1520,810 Q1530,780 1525,760"/>
  </g>
  
  <!-- 文字区域预留 - 底部 -->
  <text x="960" y="950" font-family="Space Grotesk, sans-serif" font-size="48" fill="#333" text-anchor="middle" font-weight="300" opacity="0">
    The best summer is a creative summer
  </text>
</svg>